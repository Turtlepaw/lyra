name: .NET Core Desktop

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86, ARM64]

    env:
      Solution_Name: OpenSoundcoreWindows.slnx
      Wap_Project_Directory: Package
      Wap_Project_Path: Package\Package.wapproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'x64' && 'x86_64-pc-windows-msvc' || matrix.platform == 'x86' && 'i686-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore the application
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=${{ matrix.configuration }}

      - name: Decode the PFX
        shell: pwsh
        env:
          Base64_Encoded_Pfx: ${{ secrets.BASE64_PFX }}
          Pfx_Key: ${{ secrets.Pfx_Key }}
        run: |
          if (-not $env:Base64_Encoded_Pfx) {
            Write-Host "No Base64 PFX secret found, skipping signing."
            echo "HAS_PFX=false" >> $env:GITHUB_OUTPUT
            return
          }

          if (-not $env:Pfx_Key) {
            throw "Pfx_Key secret is required when Base64_Encoded_Pfx is present."
          }

          $pfx_cert_byte = [System.Convert]::FromBase64String($env:Base64_Encoded_Pfx)
          $certificatePath = Join-Path -Path $env:Wap_Project_Directory -ChildPath "GitHubActionsWorkflow.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, $pfx_cert_byte)
          echo "HAS_PFX=true" >> $env:GITHUB_OUTPUT
          echo "PFX_PATH=$certificatePath" >> $env:GITHUB_ENV

      - name: Create the app package
        shell: pwsh
        env:
          Appx_Bundle: Never
          UapAppxPackageBuildMode: SideloadOnly
        run: |
          $configuration = '${{ matrix.configuration }}'
          $platform = '${{ matrix.platform }}'

          if ("${{ steps.decode_pfx.outputs.HAS_PFX }}" -eq "true") {
            $signingArgs = @(
              '/p:AppxPackageSigningEnabled=true',
              "/p:PackageCertificateKeyFile=$env:PFX_PATH",
              "/p:PackageCertificatePassword=$env:Pfx_Key"
            )
          } else {
            $signingArgs = @('/p:AppxPackageSigningEnabled=false')
          }

          $msbuildArgs = @(
            "$env:Wap_Project_Path",
            "/p:Configuration=$configuration",
            "/p:Platform=$platform",
            "/p:AppxBundle=$env:Appx_Bundle",
            "/p:UapAppxPackageBuildMode=$env:UapAppxPackageBuildMode",
            '/p:PublishReadyToRun=false',
            '/p:PublishTrimmed=false'
          ) + $signingArgs

          Write-Host "Running msbuild with arguments: $($msbuildArgs -join ' ')"
          & msbuild @msbuildArgs

      - name: Remove the pfx
        shell: pwsh
        run: Remove-Item -Path "$env:Wap_Project_Directory\GitHubActionsWorkflow.pfx" -ErrorAction SilentlyContinue

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MSIX Package (${{ matrix.platform }})
          path: ${{ env.Wap_Project_Directory }}\AppPackages\**\*.msix

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
