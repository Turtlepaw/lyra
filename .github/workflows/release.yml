name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        platform: [x64, x86, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'x64' && 'x86_64-pc-windows-msvc' || matrix.platform == 'x86' && 'i686-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Decode the PFX
        id: decode_pfx
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.BASE64_PFX }}
        run: |
          if (-not $env:PFX_BASE64) {
            Write-Host "No PFX_BASE64 secret found, skipping signing."
            echo "HAS_PFX=false" >> $env:GITHUB_OUTPUT
            return
          }
          $pfx_cert_byte = [System.Convert]::FromBase64String($env:PFX_BASE64)
          $certificatePath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath "GitHubActionsWorkflow.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, $pfx_cert_byte)
          echo "HAS_PFX=true" >> $env:GITHUB_OUTPUT
          echo "PFX_PATH=$certificatePath" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: msbuild -t:restore Package\Package.wapproj

      - name: Build Packaging Project
        shell: pwsh
        run: |
          $signingArgs = if ("${{ steps.decode_pfx.outputs.HAS_PFX }}" -eq "true") {
            @(
              '/p:AppxPackageSigningEnabled=true',
              "/p:PackageCertificateKeyFile=$env:PFX_PATH",
              "/p:PackageCertificatePassword=${{ secrets.PFX_PASSWORD }}"
            )
          } else {
            @('/p:AppxPackageSigningEnabled=false')
          }

          $msbuildArgs = @(
            'Package\Package.wapproj',
            '/p:Configuration=Release',
            "/p:Platform=${{ matrix.platform }}",
            '/p:AppxBundle=Never',
            '/p:UapAppxPackageBuildMode=SideloadOnly',
            '/p:PublishReadyToRun=false',
            '/p:PublishTrimmed=false'
          ) + $signingArgs

          Write-Host "Running msbuild with arguments: $($msbuildArgs -join ' ')"
          & msbuild @msbuildArgs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-${{ matrix.platform }}
          path: Package\AppPackages\**\*.msix

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
